site_name: Wiki 安裝工程
site_url: https://drogan-gas.github.io/KK/

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - content.code.copy
    - toc.follow
    - navigation.top
  font: false

plugins:
  - search
  - roamlinks

docs_dir: 'WebWiki'

extra_css:
  - "https://fonts.googleapis.com/css2?family=Iansui&display=swap"
  - stylesheets/extra.css

# 修正 1：移除重複的 markdown_extensions 宣告
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: 🔗
      baselevel: 1
      toc_depth: 1-6

# 修正 2：在 Material 主題中，Mermaid 不再建議使用 extra_javascript
# 建議直接使用主題內建的支援（見下方說明）
