site_name: Wiki 安裝工程
site_url: https://github.io

# 使用 MkDocs 內建的極簡傳統主題
theme:
  name: mkdocs
  highlightjs: true  # 啟用程式碼高亮支援

plugins:
  - search
  - roamlinks

docs_dir: 'WebWiki'

extra_css:
  - "https://googleapis.com"
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: 🔗
      baselevel: 1
      toc_depth: 1-6  # 現在極簡主題會 100% 聽從此設定，完美顯示第 1 層
