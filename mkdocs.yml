site_name: Wiki 安裝工程
site_url: https://github.com/drogan-gas/KK/ # 💡 務必加上這一行！結尾要有斜線 /
theme:
  name: material

plugins:
  - search
  - roamlinks # 支援 Obsidian 的 [[雙向連結]] 語法

docs_dir: 'WebWiki' # 💡 這裡必須與你實際要公開的資料夾名稱完全一致

# 💡 告訴 MkDocs 要載入這個額外的 CSS 檔案
extra_css:
  - stylesheets/extra.css
  
# 💡 1. 啟用 Markdown 擴充功能以支援 Python Markdown 中的 SuperFences
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# 💡 2. 載入 Material 主題內建的 Mermaid 渲染腳本
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js