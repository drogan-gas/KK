site_name: Wiki 安裝工程
site_url: https://drogan-gas.github.io/KK

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - content.code.copy
    - toc.follow
    - navigation.top
    - navigation.tabs       # 頂部大眾導航標籤
    - navigation.sections   # 左側結構化目錄
  font: false

plugins:
  - search
  - roamlinks

docs_dir: 'WebWiki'

extra_css:
  - "https://fonts.googleapis.com/css2?family=Iansui&display=swap"
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: 🔗
      toc_depth: 2-4  # 右側目錄專注顯示第 2 到 4 層標題
