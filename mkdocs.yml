site_name: Wiki 安裝工程
site_url: https://github.io

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - content.code.copy
    - toc.follow
    - navigation.top
    - toc.integrate     # ✨ 關鍵：加入這一行，目錄會融入左側，並顯示所有第 1 層標題
  font: false

plugins:
  - search
  - roamlinks

docs_dir: 'WebWiki'

extra_css:
  - "https://googleapis.com"
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: 🔗
      baselevel: 1
      toc_depth: 1-6
