site_name: Wiki 安裝工程
site_url: https://drogan-gas.github.io/KK/

theme:
  name: material
  palette:
    scheme: slate       # 保持 Minimal 深色模式
    primary: custom
    accent: custom
  features:
    - content.code.copy # 程式碼複製按鈕
  font: false           # 停用預設字型以套用芫荽體

plugins:
  - search
  - roamlinks           # 支援 Obsidian 雙向連結

docs_dir: 'WebWiki'     # 💡 這裡已改為你的特定同步資料夾名稱

extra_css:
  - https://fonts.googleapis.com/css2?family=Iansui&display=swap  # 載入 Google 芫荽字型
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js